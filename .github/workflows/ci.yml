name: CI

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - '**'
    branches:
      - '**'
  pull_request:

permissions:
  contents: read # required to checkout the code

jobs:
  checks:
    name: checks
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.02

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2
        id: python-setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        id: setup-uv
        with:
          # Install a specific version of uv.
          version: "0.11.7"
          enable-cache: true
          restore-cache: true
          save-cache: true
          prune-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}
          
      - name: Install the project
        run: uv sync --locked

      - name: check uv cache is working
        if: steps.setup-uv.outputs.cache-hit == 'true'
        run: echo "uv cache was restored"

      - name: isort
        run: uv run isort pymusas_models model_function_tests model_creation_tests model_release.py
      
      - name: flake8
        run: |
          uv run flake8 --config .flake8 pymusas_models model_function_tests model_creation_tests model_release.py
      
      - name: Cache mypy
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ./.mypy_cache
          key: ${{ runner.os }}-${{ steps.python-setup.outputs.python-version }}-${{ hashFiles('uv.lock') }}

      - name: mypy
        run: uv run mypy

      - name: Code coverage testing (creation tests)
        run: |
          uv run coverage run -m pytest --virtual-env-directory=./temp_venv --overwrite --github-ci ./model_creation_tests

      - name: Code coverage report
        run: |    
          uv run coverage report

      - name: functional tests on Linux and Mac
        if: ${{ runner.os == 'Linux' || runner.os == 'macOS' }}
        run: |
          source ./temp_venv/venv/bin/activate
          pytest --github-ci ./model_function_tests
          deactivate

      - name: functional tests on Windows
        if: ${{ runner.os == 'Windows' }}
        run: |
          .\temp_venv\venv\Scripts\Activate.ps1
          pytest --github-ci .\model_function_tests
          deactivate